<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebChat with Copilot Studio Agent</title>
  <script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    #webchat { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="webchat" role="main"></div>
  <script>
    async function startWebChat() {
      const res = await fetch('/api/token');
      const { token } = await res.json();
      window.WebChat.renderWebChat({ directLine: window.WebChat.createDirectLine({ token }) }, document.getElementById('webchat'));
    }
    startWebChat();
  </script>
</body>
</html>
